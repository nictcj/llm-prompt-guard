[pytest]
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*

testpaths = tests

addopts =
	-ra
	--strict-markers
	--html=test-artifacts/report.html
	--self-contained-html

markers =
	tc_id(case_id): link a test to a catalogue test case id
	floating: untracked test not linked to the catalogue

	smoke: smoke test
	level_unit: unit-level test
	level_integration: integration-level test
	level_e2e: end-to-end test

	component_har: Harness component
	component_llm: Mock LLM component
	component_api: API component
	component_prm: Prompter component
	component_evl: Evaluator component
	component_web: Web UI component